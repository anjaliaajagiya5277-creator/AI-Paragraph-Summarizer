<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Paragraph Summarizer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🤖 AI Paragraph Summarizer</h1>

        <p class="subtitle">
            Enter a paragraph and let Gemini AI generate a short, meaningful summary.
        </p>

        <form method="POST">

            <label>Enter Paragraph</label>

            <textarea
                name="paragraph"
                placeholder="Paste your paragraph here..."
                required>{{ paragraph }}</textarea>

            <button type="submit">
                Summarize
            </button>

        </form>

        {% if error %}

        <div class="error">
            {{ error }}
        </div>

        {% endif %}

        {% if summary %}

        <div class="result">

            <h2>Summary</h2>

            <textarea id="summaryBox" readonly>{{ summary }}</textarea>

            <button class="copy-btn"
                    onclick="copySummary()">
                Copy Summary
            </button>

        </div>

        {% endif %}

    </div>

</div>

<script>

function copySummary(){

    let copyText = document.getElementById("summaryBox");

    copyText.select();

    copyText.setSelectionRange(0,99999);

    navigator.clipboard.writeText(copyText.value);

    alert("Summary copied successfully!");

}

</script>

</body>
</html>
